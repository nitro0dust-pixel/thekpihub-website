<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0A0F1E;
            --bgMid: #111827;
            --bgCard: #1A2235;
            --bgCard2: #1F2D45;
            --teal: #0D9488;
            --tealLt: #14B8A6;
            --amber: #F59E0B;
            --amberLt: #FCD34D;
            --green: #10B981;
            --red: #EF4444;
            --purple: #A855F7;
            --pink: #EC4899;
            --orange: #F97316;
            --white: #F8FAFC;
            --gray: #94A3B8;
            --grayLt: #CBD5E1;
            --border: #1E293B;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        /* Header */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 15, 30, 0.95);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(24px);
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 1.25rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 9px;
        }

        .logo-accent {
            color: var(--teal);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .user-badge {
            font-size: 0.85rem;
            color: var(--gray);
        }

        .logout-btn {
            padding: 7px 16px;
            background: var(--red);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #DC2626;
            transform: translateY(-2px);
        }

        /* Main container */
        .container {
            margin-top: 70px;
            max-width: 1320px;
            margin-left: auto;
            margin-right: auto;
            padding: 0 20px 40px;
        }

        /* Header stats */
        .header-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bgCard);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px 20px;
            position: relative;
            overflow: hidden;
        }

        .stat-card.accent-teal {
            border-left: 3px solid var(--teal);
        }

        .stat-card.accent-green {
            border-left: 3px solid var(--green);
        }

        .stat-card.accent-amber {
            border-left: 3px solid var(--amber);
        }

        .stat-card.accent-red {
            border-left: 3px solid var(--red);
        }

        .stat-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-family: 'Syne', sans-serif;
            font-size: 26px;
            font-weight: 800;
            line-height: 1;
            color: var(--white);
        }

        .stat-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--grayLt);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-top: 6px;
        }

        /* Tabs */
        .tab-nav {
            display: flex;
            gap: 3px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
        }

        .tab-btn {
            padding: 12px 18px;
            border: 1px solid var(--border);
            border-bottom: none;
            background: transparent;
            color: var(--gray);
            cursor: pointer;
            font-family: 'Syne', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--bgCard);
            color: var(--white);
            border-color: var(--bgCard);
            border-bottom: 2px solid var(--teal);
            position: relative;
            z-index: 2;
            margin-bottom: -1px;
        }

        .tab-btn:hover {
            color: var(--white);
        }

        /* Tab content */
        .tab-content {
            display: none;
            background: var(--bgCard);
            border: 1px solid var(--border);
            border-radius: 0 14px 14px 14px;
            padding: 24px 20px;
            max-height: calc(100vh - 250px);
            overflow-y: auto;
        }

        .tab-content.active {
            display: block;
        }

        /* Task list */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .task-item {
            background: var(--bgMid);
            border: 1px solid var(--border);
            border-radius: 11px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .task-item:hover {
            border-color: var(--teal);
        }

        .task-item.done {
            opacity: 0.6;
        }

        .task-status {
            font-size: 18px;
            flex-shrink: 0;
            width: 24px;
            text-align: center;
        }

        .task-phase-bar {
            width: 3px;
            height: 32px;
            border-radius: 99px;
            flex-shrink: 0;
        }

        .task-content {
            flex: 1;
            min-width: 0;
        }

        .task-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 4px;
            color: var(--white);
        }

        .task-item.done .task-title {
            text-decoration: line-through;
            color: var(--gray);
        }

        .task-detail {
            font-size: 11px;
            color: var(--gray);
            line-height: 1.5;
        }

        .task-meta {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            font-size: 9px;
            color: var(--gray);
            margin-top: 2px;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 9px;
            font-weight: 600;
            white-space: nowrap;
        }

        .badge.phase {
            background: rgba(13, 148, 136, 0.2);
            border-color: rgba(13, 148, 136, 0.4);
            color: var(--teal);
        }

        .badge.high {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4);
            color: var(--red);
        }

        .badge.med {
            background: rgba(245, 158, 11, 0.2);
            border-color: rgba(245, 158, 11, 0.4);
            color: var(--amber);
        }

        .task-weeks {
            margin-left: auto;
            font-size: 10px;
            color: var(--gray);
            flex-shrink: 0;
        }

        /* Progress bar */
        .progress {
            height: 4px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .progress-fill {
            height: 100%;
            background: var(--teal);
            transition: width 0.6s ease;
            border-radius: 99px;
        }

        /* Grid layouts */
        .milestone-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 12px;
        }

        .milestone-card {
            background: var(--bgMid);
            border: 1px solid rgba(13, 148, 136, 0.2);
            border-radius: 12px;
            padding: 14px 16px;
            display: flex;
            gap: 12px;
        }

        .milestone-icon {
            width: 38px;
            height: 38px;
            border-radius: 9px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: rgba(13, 148, 136, 0.15);
            border: 1px solid rgba(13, 148, 136, 0.25);
        }

        .milestone-content {
            flex: 1;
            min-width: 0;
        }

        .milestone-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 12px;
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .milestone-detail {
            font-size: 10px;
            color: var(--gray);
            line-height: 1.5;
        }

        .success-check {
            color: var(--green);
            font-size: 14px;
        }

        /* Stream cards */
        .stream-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 12px;
        }

        .stream-card {
            background: var(--bgMid);
            border-radius: 15px;
            border: 1px solid var(--border);
            padding: 18px 20px;
            position: relative;
            overflow: hidden;
        }

        .stream-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }

        .stream-icon {
            width: 42px;
            height: 42px;
            flex-shrink: 0;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: rgba(13, 148, 136, 0.15);
            border: 1px solid rgba(13, 148, 136, 0.25);
        }

        .stream-info {
            flex: 1;
        }

        .stream-name {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .stream-badges {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .stream-potential {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 13px;
            color: var(--teal);
            text-align: right;
            flex-shrink: 0;
        }

        .stream-detail {
            font-size: 11px;
            color: var(--gray);
            line-height: 1.5;
            margin-bottom: 12px;
        }

        /* Charts placeholder */
        .chart-container {
            background: var(--bgMid);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray);
        }

        /* Loading and errors */
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray);
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(13, 148, 136, 0.3);
            border-top-color: var(--teal);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: var(--red);
            padding: 12px 16px;
            border-radius: 9px;
            font-size: 12px;
            margin-bottom: 16px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .topbar {
                padding: 12px 16px;
            }

            .container {
                margin-top: 60px;
            }

            .header-stats {
                grid-template-columns: 1fr;
            }

            .tab-nav {
                flex-wrap: wrap;
            }

            .milestone-grid,
            .stream-grid {
                grid-template-columns: 1fr;
            }
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }
    </style>
</head>

// ============ STATE ============
let tasks = [...INIT_TASKS];

// Load tasks from localStorage
function loadTasks() {
    const saved = localStorage.getItem('kpihub_tasks_v1');
    if (saved) {
        try {
            tasks = JSON.parse(saved);
        } catch (e) {
            console.error('Failed to load tasks:', e);
        }
    }
}

function saveTasks() {
    localStorage.setItem('kpihub_tasks_v1', JSON.stringify(tasks));
    updateStats();
    renderCommandCenter();
    renderTodoList();
}

// ============ AUTH ============
function checkAuth() {
    const token = localStorage.getItem('authToken');
    const email = localStorage.getItem('userEmail');

    if (!token || !email) {
        window.location.href = 'admin-login.html';
        return false;
    }

    // Check token expiry
    const expiry = localStorage.getItem('tokenExpiry');
    if (expiry && new Date(expiry) < new Date()) {
        handleLogout();
        return false;
    }

    document.getElementById('userEmail').textContent = email;
    return true;
}

function handleLogout() {
    localStorage.removeItem('authToken');
    localStorage.removeItem('userEmail');
    localStorage.removeItem('userRole');
    localStorage.removeItem('tokenExpiry');
    window.location.href = 'admin-login.html';
}

// ============ UTILS ============
function updateStats() {
    const done = tasks.filter(t => t.status === 'done').length;
    const inProg = tasks.filter(t => t.status === 'inprogress').length;
    const remaining = 22 - done;

    document.getElementById('doneCount').textContent = done;
    document.getElementById('inProgressCount').textContent = inProg;
    document.getElementById('remainingCount').textContent = remaining;
}

function toggleTask(id) {
    const task = tasks.find(t => t.id === id);
    if (task) {
        const states = { todo: 'inprogress', inprogress: 'done', done: 'todo' };
        task.status = states[task.status];
        saveTasks();
    }
}

// ============ RENDER PIPELINE ============
function renderPipeline() {
    const GITHUB_REPO = 'nitr0dust-pixel/thekpihub-pipeline';
    const WORKFLOW_URL = `https://github.com/${GITHUB_REPO}/actions`;

    const container = document.getElementById('pipelineContent');

    container.innerHTML = `
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px;">
            <div class="stat-card accent-teal">
                <div class="stat-icon">🤖</div>
                <div><div class="stat-value" id="pipeSuccessRate">—</div><div class="stat-label">Success Rate</div></div>
            </div>
            <div class="stat-card accent-green">
                <div class="stat-icon">📰</div>
                <div><div class="stat-value" id="pipeArticlesWeek">—</div><div class="stat-label">Articles This Week</div></div>
            </div>
            <div class="stat-card accent-amber">
                <div class="stat-icon">🔁</div>
                <div><div class="stat-value" id="pipeTotalRuns">—</div><div class="stat-label">Total Runs</div></div>
            </div>
            <div class="stat-card accent-red">
                <div class="stat-icon">⏰</div>
                <div><div class="stat-value" id="pipeLastRun" style="font-size:14px;">—</div><div class="stat-label">Last Run</div></div>
            </div>
        </div>

        <div style="background:var(--bgMid);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
                <div style="font-family:Syne;font-weight:800;font-size:13px;">Recent Pipeline Runs</div>
                <a href="${WORKFLOW_URL}" target="_blank" rel="noopener"
                   style="font-family:Syne;font-size:11px;font-weight:700;color:var(--teal);text-decoration:none;border:1px solid rgba(13,148,136,0.4);padding:4px 12px;border-radius:6px;">
                   Open GitHub Actions ↗
                </a>
            </div>
            <div id="pipeRunsList"><div class="loading"><div class="spinner"></div><p style="margin-top:8px;font-size:12px;">Fetching pipeline data…</p></div></div>
        </div>

        <div style="background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.2);border-radius:9px;padding:12px 16px;font-size:11px;color:var(--amber);">
            🔔 <strong>Schedule:</strong> 4×/day (01:00 · 07:00 · 13:00 · 19:00 UTC) — 5 AI engines → 3 articles/run → saved to artifacts
            &nbsp;·&nbsp; <a href="${WORKFLOW_URL}" target="_blank" rel="noopener" style="color:var(--amber);">Monitor live ↗</a>
        </div>
    `;

    // Fetch public pipeline data from GitHub API (no auth needed for public repos)
    const apiUrl = `https://api.github.com/repos/${GITHUB_REPO}/actions/workflows/pipeline.yml/runs?per_page=10`;

    fetch(apiUrl, { headers: { 'Accept': 'application/vnd.github.v3+json', 'User-Agent': 'thekpihub-dashboard' } })
        .then(r => r.json())
        .then(data => {
            const runs = (data.workflow_runs || []).slice(0, 7);
            const success = runs.filter(r => r.conclusion === 'success').length;
            const rate = runs.length ? Math.round(success / runs.length * 100) : 0;
            const articlesWeek = success * 7;

            document.getElementById('pipeSuccessRate').textContent = rate + '%';
            document.getElementById('pipeArticlesWeek').textContent = articlesWeek;
            document.getElementById('pipeTotalRuns').textContent = data.total_count || runs.length;

            const last = runs[0];
            if (last) {
                const d = new Date(last.created_at);
                document.getElementById('pipeLastRun').textContent =
                    d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit', timeZone:'Asia/Kolkata' });
            }

            const icons = { success:'✅', failure:'❌', cancelled:'⏹', in_progress:'⏳', queued:'🕐' };
            const colours = { success:'#10B981', failure:'#EF4444', cancelled:'#94A3B8', in_progress:'#F59E0B', queued:'#94A3B8' };

            if (runs.length === 0) {
                document.getElementById('pipeRunsList').innerHTML =
                    '<p style="font-size:12px;color:var(--gray);text-align:center;padding:20px;">No runs found. Check the repo name or make sure the workflow exists.</p>';
                return;
            }

            document.getElementById('pipeRunsList').innerHTML = runs.map(r => {
                const status = r.conclusion || r.status;
                const dur = r.run_started_at
                    ? Math.round((new Date(r.updated_at) - new Date(r.run_started_at)) / 60000)
                    : 0;
                return `
                    <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);">
                        <span style="font-size:16px;width:20px;text-align:center;">${icons[status] || '❓'}</span>
                        <div style="flex:1;min-width:0;">
                            <div style="font-family:Syne;font-weight:700;font-size:12px;">Run #${r.run_number}</div>
                            <div style="font-size:10px;color:var(--gray);">${new Date(r.created_at).toLocaleDateString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',timeZone:'Asia/Kolkata'})}</div>
                        </div>
                        <span style="font-size:10px;font-weight:700;color:${colours[status] || '#94A3B8'};min-width:70px;text-align:right;">${status.toUpperCase()}</span>
                        <span style="font-size:10px;color:var(--gray);min-width:50px;text-align:right;">${dur ? dur + 'm' : '—'}</span>
                        <a href="${r.html_url}" target="_blank" rel="noopener"
                           style="font-size:10px;color:var(--teal);text-decoration:none;font-weight:700;min-width:30px;text-align:right;">Log ↗</a>
                    </div>
                `;
            }).join('');
        })
        .catch(() => {
            document.getElementById('pipeRunsList').innerHTML = `
                <div class="error-msg">
                    ⚠ Could not reach GitHub API. The pipeline repo may be private or rate-limited.
                    <a href="https://github.com/${GITHUB_REPO}/actions" target="_blank" rel="noopener"
                       style="color:var(--red);font-weight:700;"> Open GitHub directly ↗</a>
                </div>
            `;
            // Show zeros so UI doesn't stay blank
            ['pipeSuccessRate','pipeArticlesWeek','pipeTotalRuns','pipeLastRun'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.textContent = 'N/A';
            });
        });
}

// ============ TAB SWITCHING ============
document.querySelectorAll('.tab-btn').forEach(btn => {

        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

        btn.classList.add('active');
        const tabId = btn.dataset.tab;
        document.getElementById(tabId).classList.add('active');
        currentTab = tabId;
    });
});
