# ─────────────────────────────────────────────────────────────────────────────
# KPI Hub — Daily Intelligence Pipeline
# Schedule: 03:03 AM IST = 21:33 UTC (previous calendar day)
# Publishes 7 articles to WordPress, live at 06:00 AM IST
# ─────────────────────────────────────────────────────────────────────────────
name: Daily Intelligence Pipeline

on:
  schedule:
    - cron: "33 21 * * *"   # 03:03 AM IST every day
  workflow_dispatch:         # Manual trigger from GitHub UI
    inputs:
      dry_run:
        description: "Dry run (skip WP publish + Telegram)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

# Prevent two pipeline runs overlapping
concurrency:
  group: kpihub-pipeline-${{ github.ref }}
  cancel-in-progress: false   # Never cancel a running pipeline; queue instead

jobs:
  run-pipeline:
    name: "🚀 KPI Hub Pipeline — ${{ github.event.inputs.dry_run == 'true' && 'DRY RUN' || 'LIVE' }}"
    runs-on: ubuntu-latest
    timeout-minutes: 90        # Full run ~60 min; 90 min hard cap

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SERPAPI_KEY:        ${{ secrets.SERPAPI_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
      WP_SITE_URL:        ${{ secrets.WP_SITE_URL }}
      WP_USERNAME:        ${{ secrets.WP_USERNAME }}
      WP_APP_PASSWORD:    ${{ secrets.WP_APP_PASSWORD }}
      CLAUDE_MODEL:       "claude-sonnet-4-6"
      DRY_RUN:            ${{ github.event.inputs.dry_run || 'false' }}

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      # ── Install deps ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      # ── Create reports dir ────────────────────────────────────────────────
      - name: Prepare reports directory
        run: mkdir -p reports

      # ── Run pipeline ──────────────────────────────────────────────────────
      - name: Run intelligence pipeline
        id: pipeline
        run: python pipeline.py ${{ env.DRY_RUN == 'true' && '--dry-run' || '' }}

      # ── Upload artifacts ──────────────────────────────────────────────────
      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: |
            pipeline.log
            reports/
          retention-days: 14

      # ── Telegram failure alert ────────────────────────────────────────────
      - name: Notify Telegram on failure
        if: failure()
        run: |
          MESSAGE="❌ *KPI Hub Pipeline FAILED*%0A"
          MESSAGE+="Run: \`${{ github.run_id }}\`%0A"
          MESSAGE+="Branch: ${{ github.ref_name }}%0A"
          MESSAGE+="Triggered by: ${{ github.event_name }}%0A"
          MESSAGE+="Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=Markdown"
